<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Grocery · FreshMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Inter', system-ui, sans-serif;
      background: #f4f6fa;
      padding: 16px 12px 100px;
      color: #1e293b;
      min-height: 100vh;
    }

    .app-wrapper {
      position: relative;
      min-height: 100vh;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      background: #fff;
      padding: 8px 12px 8px 16px;
      border-radius: 40px;
      box-shadow: 0 4px 12px rgba(0,0,0,.03);
    }

    .search-wrapper {
      flex: 1;
      position: relative;
      height: 48px;
    }

    .search-wrapper input {
      width: 100%;
      padding: 12px 48px 12px 16px;
      border: none;
      background: #f0f2f6;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      color: #1e293b;
      height: 48px;
      position: relative;
      z-index: 2;
      background: transparent;
    }

    .search-wrapper input:focus {
      background: #fff;
      box-shadow: 0 0 0 2px #00b14f40;
    }

    .search-wrapper input:focus~.search-placeholder {
      opacity: 0;
    }

    .search-placeholder {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #94a3b8;
      pointer-events: none;
      height: 24px;
      overflow: hidden;
      z-index: 1;
      transition: opacity .3s ease;
      width: calc(100% - 56px);
    }

    .search-placeholder .text-wrapper {
      display: flex;
      flex-direction: column;
      animation: slideUp 12s ease-in-out infinite;
    }

    .search-placeholder .text-item {
      height: 24px;
      line-height: 24px;
      white-space: nowrap;
      opacity: .8;
    }

    @keyframes slideUp {
      0%,20% { transform: translateY(0); }
      25%,45% { transform: translateY(-24px); }
      50%,70% { transform: translateY(-48px); }
      75%,95% { transform: translateY(-72px); }
      100% { transform: translateY(0); }
    }

    .search-icon-svg {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      stroke: #6a7b8c;
      stroke-width: 2.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      z-index: 3;
      cursor: pointer;
      transition: stroke .2s;
    }

    .search-icon-svg:hover {
      stroke: #00b14f;
    }

    .header-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      padding: 6px 4px;
      cursor: pointer;
      border-radius: 30px;
      color: #1e293b;
      position: relative;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #eef2f7;
    }

    .profile-pic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #eef2f7;
    }

    .profile-svg {
      width: 28px;
      height: 28px;
      fill: #1f3763;
      transition: fill .2s;
    }

    .icon-btn:hover .profile-svg {
      fill: #00b14f;
    }

    /* Categories */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 20px 0 12px;
      color: #0b1a2e;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .category-card {
      background: #fff;
      border-radius: 20px;
      padding: 8px 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.02);
      text-align: center;
      cursor: pointer;
      border: 1px solid #ADA0A069;
      transition: .15s;
      overflow: hidden;
    }

    .category-card:hover {
      border-color: #00B14F60;
      transform: scale(.97);
    }

    .category-card .cat-img {
      width: 100%;
      height: 72px;
      object-fit: cover;
      border-radius: 12px;
      background: #f0f2f6;
      display: block;
    }

    .category-card .cat-name {
      font-weight: 600;
      font-size: 11px;
      color: #0b1a2e;
      display: block;
      margin-top: 4px;
    }

    /* Products */
    .products-section {
      display: none;
      margin-top: 1px;
      animation: fadeUp .25s ease;
    }

    @keyframes fadeUp {
      0% { opacity: .5; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .back-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .back-btn {
      background: #f0f2f6;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      color: #1e293b;
      cursor: pointer;
      transition: .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover {
      background: #e2e8f0;
    }

    .category-title {
      font-size: 20px;
      font-weight: 700;
      color: #0b1a2e;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 8px;
    }

    .product-card {
      background: #fff;
      border-radius: 20px;
      padding: 12px 8px 10px;
      border: 1px solid #edf2f9;
      text-align: center;
      position: relative;
    }

    .product-img {
      width: 100%;
      height: 110px;
      object-fit: contain;
      border-radius: 12px;
      background: #f8fafc;
      display: block;
      margin-bottom: 4px;
    }

    .product-name {
      font-weight: 600;
      font-size: 13px;
      color: #0b1a2e;
      margin: 3px 0;
    }

    .product-price {
      font-weight: 600;
      font-size: 15px;
      color: #0d7a3e;
      margin: 2px 0 5px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .qty-controls button {
      background: #eef2f7;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #1e293b;
      transition: .15s;
    }

    .qty-controls button:hover {
      background: #dce2ea;
    }

    .qty-controls .qty-display {
      font-weight: 600;
      font-size: 15px;
      min-width: 24px;
      text-align: center;
    }

    .add-to-cart-btn {
      background: #0d7a3e;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: .2s;
      width: 100%;
      margin-top: 4px;
    }

    .add-to-cart-btn:hover {
      background: #0b6a35;
    }

    .qty-controls.hidden {
      display: none;
    }

    .wishlist-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      transition: .15s;
      color: #cbd5e1;
      padding: 0;
      line-height: 1;
    }

    .wishlist-btn:hover {
      transform: scale(1.1);
    }

    .wishlist-btn.active {
      color: #ef4444;
    }

    /* Cart Drawer */
    .cart-drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.3);
      z-index: 998;
      display: none;
      opacity: 0;
      transition: opacity .35s ease;
    }

    .cart-drawer-overlay.open {
      display: block;
      opacity: 1;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      left: -360px;
      width: 340px;
      max-width: 90%;
      height: 100%;
      background: #fff;
      z-index: 1000;
      padding: 20px 16px;
      box-shadow: 4px 0 20px rgba(0,0,0,.08);
      transition: left .4s cubic-bezier(.25,.8,.25,1);
      display: flex;
      flex-direction: column;
      border-radius: 0 24px 24px 0;
      overflow-y: auto;
    }

    .cart-drawer.open {
      left: 0;
    }

    .cart-drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid #eef2f9;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .cart-drawer-header h2 {
      font-size: 18px;
    }

    .cart-drawer-close {
      background: 0 0;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #64748b;
    }

    .cart-drawer-items {
      flex: 1;
      overflow-y: auto;
    }

    .cart-drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .cart-drawer-item .item-info {
      flex: 1;
    }

    .cart-drawer-item .item-name {
      font-weight: 500;
      font-size: 14px;
    }

    .cart-drawer-item .item-price {
      font-size: 13px;
      color: #64748b;
    }

    .cart-drawer-item .item-qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cart-drawer-item .item-qty-controls button {
      background: #eef2f7;
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .cart-drawer-item .item-qty-controls button:hover {
      background: #dce2ea;
    }

    .cart-drawer-item .item-qty-controls .qty {
      min-width: 20px;
      text-align: center;
      font-weight: 600;
    }

    .cart-drawer-footer {
      padding-top: 16px;
      border-top: 1px solid #eef2f9;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .cart-drawer-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .cart-drawer-checkout {
      background: #00b14f;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      width: 100%;
      cursor: pointer;
    }

    .cart-drawer-checkout:hover {
      background: #009a42;
    }

    .cart-drawer-empty {
      text-align: center;
      color: #94a3b8;
      padding: 30px 0;
    }

    /* Drawer Checkout */
    .drawer-checkout-section {
      background: #f8fafc;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid #eef2f9;
    }

    .drawer-checkout-section h4 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #0b1a2e;
    }

    .drawer-checkout-section input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #e0e8f0;
      font-size: 14px;
      margin-bottom: 8px;
      background: #fff;
    }

    .drawer-checkout-section .phone-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #e0e8f0;
      font-size: 14px;
      margin-bottom: 8px;
      background: #fff;
      letter-spacing: 1px;
    }

    .drawer-checkout-section .phone-input:focus {
      outline: 0;
      border-color: #00b14f;
      box-shadow: 0 0 0 2px #00b14f40;
    }

    .drawer-checkout-section .saved-addr-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      padding: 4px 10px;
      border-radius: 40px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .drawer-checkout-section .order-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 40px;
      background: #cbd5e1;
      color: #475569;
      font-weight: 700;
      font-size: 15px;
      margin-top: 4px;
    }

    .drawer-checkout-section .order-btn.ready {
      background: #00b14f;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,177,79,.2);
    }

    .drawer-checkout-section .order-btn.ready:hover {
      background: #009a42;
    }

    .drawer-checkout-section .label-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0;
    }

    .drawer-checkout-section .label-btn {
      padding: 2px 12px;
      border-radius: 30px;
      border: 2px solid #d0d7dd;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
    }

    .drawer-checkout-section .label-btn.active-home {
      border-color: #28a745;
      background: #28a745;
      color: #fff;
    }

    .drawer-checkout-section .label-btn.active-office {
      border-color: #ff9800;
      background: #ff9800;
      color: #fff;
    }

    .drawer-checkout-section .label-btn.active-none {
      border-color: #1a5fc7;
      background: #1a5fc7;
      color: #fff;
    }

    .drawer-checkout-section .address-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }

    .drawer-checkout-section .address-btn:hover {
      background: #1d4ed8;
    }

    /* Profile Drawer */
    .profile-drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.3);
      z-index: 998;
      display: none;
      opacity: 0;
      transition: opacity .35s ease;
    }

    .profile-drawer-overlay.open {
      display: block;
      opacity: 1;
    }

    .profile-drawer {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      max-width: 85%;
      height: 100%;
      background: #fff;
      z-index: 1000;
      padding: 24px 20px;
      box-shadow: -4px 0 20px rgba(0,0,0,.08);
      transition: right .4s cubic-bezier(.25,.8,.25,1);
      display: flex;
      flex-direction: column;
      border-radius: 24px 0 0 24px;
      overflow-y: auto;
    }

    .profile-drawer.open {
      right: 0;
    }

    .drawer-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .drawer-close {
      background: 0 0;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #64748b;
      padding: 4px 8px;
    }

    .drawer-user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eef2f9;
      margin-bottom: 20px;
    }

    .drawer-user-pic {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #eef2f7;
    }

    .drawer-user-name {
      font-weight: 600;
      font-size: 16px;
      color: #0b1a2e;
    }

    .drawer-user-email {
      font-size: 13px;
      color: #64748b;
    }

    .drawer-menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      font-weight: 500;
      font-size: 15px;
      color: #1e293b;
      transition: .15s;
    }

    .drawer-menu-item:hover {
      background: #f8fafc;
      padding-left: 8px;
      border-radius: 12px;
    }

    .drawer-menu-item .icon {
      font-size: 22px;
      width: 32px;
      text-align: center;
    }

    .drawer-login-btn {
      background: #00b14f;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: auto;
      transition: .15s;
    }

    .drawer-login-btn:hover {
      background: #009a42;
    }

    .drawer-logout-btn {
      background: #eef2f7;
      color: #1e293b;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: .15s;
    }

    .drawer-logout-btn:hover {
      background: #e2e8f0;
    }

    .drawer-wishlist-badge {
      margin-left: auto;
      background: #00b14f10;
      color: #00b14f;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
    }

    .wishlist-drawer-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .wishlist-drawer-item .emoji {
      font-size: 16px;
      width: 24px;
      text-align: center;
    }

    .wishlist-drawer-item .info {
      flex: 1;
    }

    .wishlist-drawer-item .info .name {
      font-weight: 500;
      font-size: 12px;
    }

    .wishlist-drawer-item .info .price {
      font-size: 11px;
      color: #64748b;
    }

    .wishlist-drawer-item .cart-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .wishlist-drawer-item .cart-actions button {
      background: #eef2f7;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #1e293b;
      transition: .15s;
    }

    .wishlist-drawer-item .cart-actions button:hover {
      background: #dce2ea;
    }

    .wishlist-drawer-item .cart-actions .qty {
      font-weight: 600;
      font-size: 12px;
      min-width: 16px;
      text-align: center;
    }

    .wishlist-drawer-item .remove-wishlist {
      background: 0 0;
      border: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
    }

    /* Orders Section */
    .drawer-orders-section {
      margin-top: 16px;
      border-top: 1px solid #eef2f9;
      padding-top: 14px;
    }

    .drawer-orders-section h4 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #0b1a2e;
    }

    .drawer-orders-section .orders-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid #e6edf5;
      margin-bottom: 8px;
    }

    .drawer-orders-section .orders-tabs button {
      background: 0 0;
      border: none;
      padding: 6px 12px;
      font-weight: 600;
      cursor: pointer;
      color: #64748b;
      font-size: 13px;
    }

    .drawer-orders-section .orders-tabs button.active {
      color: #00b14f;
      border-bottom: 3px solid #00b14f;
    }

    .drawer-orders-section .tab-content {
      display: none;
    }

    .drawer-orders-section .tab-content.active {
      display: block;
    }

    .drawer-orders-section .card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 1px solid #eef2f9;
      font-size: 13px;
    }

    .drawer-orders-section .card .status-timeline {
      display: flex;
      gap: 2px;
      margin: 4px 0;
      flex-wrap: wrap;
    }

    .drawer-orders-section .card .status-step {
      flex: 1;
      text-align: center;
      padding: 2px 4px;
      border-radius: 30px;
      background: #eef2f7;
      color: #334155;
      font-size: 9px;
      font-weight: 600;
      min-width: 36px;
    }

    .drawer-orders-section .card .status-step.active {
      background: #00b14f;
      color: #fff;
    }

    .drawer-orders-section .card .status-step.completed {
      background: #2563eb;
      color: #fff;
    }

    .drawer-orders-section .card .ok {
      color: #00b14f;
      font-weight: 700;
    }

    .drawer-orders-section .card .cancel {

      if (digits.length >= 4) {
        formatted = digits.slice(0, 4) + "-" + digits.slice(4);
      } else {
        formatted = digits;
      }
      this.value = formatted;
      savePhoneToStorageDrawer();
      updateOrderButtonDrawer();
    });
    loadPhoneFromStorageDrawer();
  }

  function savePhoneToStorageDrawer() {
    if (!currentUser) return;
    const phone = getPhoneNumberDrawer();
    if (phone && phone.length === 11) localStorage.setItem(`user_phone_${currentUser.uid}`, phone);
  }

  function loadPhoneFromStorageDrawer() {
    if (!currentUser) return;
    const saved = localStorage.getItem(`user_phone_${currentUser.uid}`);
    if (saved) {
      const num = saved.replace(/\D/g, "");
      if (num.length === 11) setPhoneNumberDrawer(num);
    }
  }

  function loadUserDataDrawer() {
    if (!currentUser) return;
    const savedName = localStorage.getItem(`user_name_${currentUser.uid}`);
    const nameInput = document.getElementById("drawerName");
    if (savedName && nameInput) nameInput.value = savedName;
    loadPhoneFromStorageDrawer();
    updateOrderButtonDrawer();
  }

  function saveUserDataDrawer() {
    if (!currentUser) return;
    const nameInput = document.getElementById("drawerName");
    const name = nameInput ? nameInput.value.trim() : "";
    if (name) localStorage.setItem(`user_name_${currentUser.uid}`, name);
    savePhoneToStorageDrawer();
    updateOrderButtonDrawer();
  }

  function getSavedAddressesDrawer() {
    if (!currentUser) return [];
    const data = localStorage.getItem(`saved_addresses_${currentUser.uid}`);
    return data ? JSON.parse(data) : [];
  }

  function saveAddressToStorageDrawer(address, label) {
    if (!currentUser || !address.trim()) return;
    const addresses = getSavedAddressesDrawer();
    const existing = addresses.find(a => a.address === address);
    if (existing) {
      existing.label = label;
    } else {
      addresses.push({ address: address.trim(), label: label || "None", id: Date.now() });
    }
    localStorage.setItem(`saved_addresses_${currentUser.uid}`, JSON.stringify(addresses));
    renderSavedAddressesDrawer();
  }

  function deleteAddressFromStorageDrawer(id) {
    if (!currentUser) return;
    let addresses = getSavedAddressesDrawer();
    addresses = addresses.filter(a => a.id !== id);
    localStorage.setItem(`saved_addresses_${currentUser.uid}`, JSON.stringify(addresses));
    renderSavedAddressesDrawer();
  }

  function renderSavedAddressesDrawer() {
    const container = document.getElementById("drawerSavedAddressesList");
    if (!container) return;
    const addresses = getSavedAddressesDrawer();
    container.innerHTML = "";
    if (addresses.length === 0) {
      container.innerHTML = '<div style="color:#64748b;font-size:12px;">No saved addresses</div>';
      return;
    }
    addresses.forEach(addr => {
      const div = document.createElement("div");
      div.className = "saved-addr-item";
      div.innerHTML = `
                <span style="font-weight:600;font-size:10px;padding:1px 8px;border-radius:16px;background:#eef2f7;">${addr.label || "📍"}</span>
                <span style="flex:1;font-size:11px;">${addr.address}</span>
                <div style="display:flex;gap:4px;">
                    <button class="drawer-use-addr" data-id="${addr.id}" style="background:#00b14f;border:none;padding:2px 10px;border-radius:30px;color:white;font-size:10px;cursor:pointer;">Use</button>
                    <button class="drawer-del-addr" data-id="${addr.id}" style="background:#d93c3c;border:none;padding:2px 10px;border-radius:30px;color:white;font-size:10px;cursor:pointer;">✕</button>
                </div>
            `;
      container.appendChild(div);
      div.querySelector(".drawer-use-addr").addEventListener("click", e => {
        e.stopPropagation();
        setAddressDrawer(addr.address, addr.label);
      });
      div.querySelector(".drawer-del-addr").addEventListener("click", e => {
        e.stopPropagation();
        if (confirm("Delete this saved address?")) deleteAddressFromStorageDrawer(addr.id);
      });

  function updateLabelButtonsDrawer() {
    document.querySelectorAll(".drawer-label-btn").forEach(btn => {
      btn.className = "drawer-label-btn label-btn";
      if (btn.dataset.label === selectedLabel) {
        if (selectedLabel === "Home") btn.classList.add("active-home");
        else if (selectedLabel === "Office") btn.classList.add("active-office");
        else btn.classList.add("active-none");
      }
    });
  }

  function setAddressDrawer(address, label = null) {
    const input = document.getElementById("drawerAddress");
    if (!input) return;
    input.value = address;
    if (label) {
      selectedLabel = label;
      updateLabelButtonsDrawer();
      saveAddressToStorageDrawer(address, label);
    }
    const savedAs = document.getElementById("drawerSavedAsSection");
    if (savedAs) savedAs.style.display = "block";
    updateOrderButtonDrawer();
    renderSavedAddressesDrawer();
  }

  function clearAddressDrawer() {
    const input = document.getElementById("drawerAddress");
    if (!input) return;
    input.value = "";
    input.disabled = false;
    const savedAs = document.getElementById("drawerSavedAsSection");
    if (savedAs) savedAs.style.display = "none";
    selectedLabel = "None";
    updateLabelButtonsDrawer();
    updateOrderButtonDrawer();
  }

  function startQuickLocationDrawer() {
    if (!currentUser) { alert("Please login first"); return; }
    if (!navigator.geolocation) { alert("Geolocation not supported"); return; }
    const input = document.getElementById("drawerAddress");
    if (!input) return;
    input.value = "Fetching location...";
    input.disabled = true;
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const address = `📍 ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        input.value = address;
        input.disabled = false;
        if (selectedLabel !== "None") {
          saveAddressToStorageDrawer(address, selectedLabel);
        }
        const savedAs = document.getElementById("drawerSavedAsSection");
        if (savedAs) savedAs.style.display = "block";
        updateOrderButtonDrawer();
        renderSavedAddressesDrawer();
      },
      () => {
        input.value = "";
        input.disabled = false;
        alert("Could not get location. Please enter manually.");
      }
    );

    const addressInput = document.getElementById("drawerAddress");

    const phone = getPhoneNumberDrawer();

            document.getElementById("drawerQuickLocationBtn").onclick = startQuickLocationDrawer;

            document.getElementById("drawerName").oninput = function() {

              updateOrderButtonDrawer();

            document.getElementById("drawerPhoneInput").oninput = function() {
              savePhoneToStorageDrawer();
              updateOrderButtonDrawer();
            };

            document.getElementById("drawerAddress").oninput = function() {
              updateOrderButtonDrawer();
              if (this.value.trim()) {
                document.getElementById("drawerSavedAsSection").style.display = "block";
              }

            document.getElementById("drawerPlaceOrderBtn").onclick = async function() {
              if (this.disabled) {
                alert("Please fill in all details correctly.");
                return;
              }
              try {
                const name = document.getElementById("drawerName").value.trim();
                const phone = getPhoneNumberDrawer();
                const address = document.getElementById("drawerAddress").value.trim();

                if (!name || phone.length !== 11 || !address) {
                  alert("Please fill in all details correctly.");
                  return;
                }

                saveUserDataDrawer();
                if (selectedLabel !== "None" && address) {
                  saveAddressToStorageDrawer(address, selectedLabel);
                }

                let total = 0;
                cart.forEach(item => { total += item.price * item.qty; });

                await addDoc(collection(db, "orders"), {
                  userEmail: currentUser.email,
                  customerName: name,
                  phone: phone,
                  address: address,
                  addressLabel: selectedLabel !== "None" ? selectedLabel : "",
                  items: cart,
                  totalBill: toPKR(total),
                  status: "Pending",
                  canCancel: true,
                  orderTime: Date.now()
                });

                alert("✅ Order Placed Successfully!");
                cart = [];
                saveCartToStorage();
                renderCart();
                renderCartDrawer();
                clearAddressDrawer();
                selectedLabel = "None";
                updateLabelButtonsDrawer();
                ordersCache.loaded = false;
                loadDrawerOrders();
                renderCurrentProducts();
                updateStickyBar();
                section.style.display = "none";
              } catch (err) {
                alert("Error placing order: " + err.message);
              }
            };
          } else {
            section.style.display = "none";
          }
        }
      };
    }
  }

  // ===== ORDER FUNCTIONS =====
  async function loadDrawerOrders() {
    if (ordersCache.loaded) {
      renderOrdersFromCache();
      return;
    }

    if (ordersCache.loading) {
      const checkLoaded = setInterval(() => {
        if (ordersCache.loaded) {
          clearInterval(checkLoaded);
          renderOrdersFromCache();
        }
      }, 100);
      return;
    }

    const currentContainer = document.getElementById("drawerCurrentOrders");
    const historyContainer = document.getElementById("drawerHistoryOrders");
    if (!currentContainer || !historyContainer) return;

    if (!currentUser) {
      const activeTab = document.querySelector('.orders-tabs .tab-btn.active');
      if (activeTab) {
        const targetId = activeTab.dataset.tab;
        const container = document.getElementById(targetId === 'drawerCurrentTab' ? 'drawerCurrentOrders' : 'drawerHistoryOrders');
        if (container) {
          container.innerHTML = '<div class="card" style="text-align:center;color:#64748b;padding:30px 20px;">🔒 Please login to view your orders</div>';
        }
        const inactiveContainer = document.getElementById(targetId === 'drawerCurrentTab' ? 'drawerHistoryOrders' : 'drawerCurrentOrders');
        if (inactiveContainer) inactiveContainer.innerHTML = "";
      }
      return;
    }

    ordersCache.loading = true;
    try {
      const q = query(collection(db, "orders"), where("userEmail", "==", currentUser.email));
      const snapshot = await getDocs(q);
      ordersCache.current = [];
      ordersCache.history = [];

      if (!snapshot.empty) {
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const status = data.status || "Pending";
          if (status === "Pending" || status === "Packed" || status === "PickedUp") {
            ordersCache.current.push({ doc: docSnap, data: data });
          } else if (status === "Delivered" || status === "Cancelled" || status === "Completed") {
            ordersCache.history.push({ doc: docSnap, data: data });
          } else {
            ordersCache.current.push({ doc: docSnap, data: data });
          }
        });
        ordersCache.current.sort((a, b) => (b.data.orderTime || 0) - (a.data.orderTime || 0));
        ordersCache.history.sort((a, b) => (b.data.orderTime || 0) - (a.data.orderTime || 0));
      }
      ordersCache.loaded = true;
      ordersCache.loading = false;
      renderOrdersFromCache();
    } catch (e) {
      console.error("loadDrawerOrders error:", e);
      ordersCache.loading = false;
      const activeTab = document.querySelector('.orders-tabs .tab-btn.active');
      if (activeTab) {
        const targetId = activeTab.dataset.tab;
        const container = document.getElementById(targetId === 'drawerCurrentTab' ? 'drawerCurrentOrders' : 'drawerHistoryOrders');
        if (container) {
          container.innerHTML = '<div class="card" style="text-align:center;color:#ef4444;padding:30px 20px;">❌ Error loading orders</div>';
        }
      }
    }
  }

  function renderOrdersFromCache() {
    const currentContainer = document.getElementById("drawerCurrentOrders");
    const historyContainer = document.getElementById("drawerHistoryOrders");
    if (!currentContainer || !historyContainer) return;

    if (!currentUser) {
      const activeTab = document.querySelector('.orders-tabs .tab-btn.active');
      if (activeTab) {
        const targetId = activeTab.dataset.tab;
        const container = document.getElementById(targetId === 'drawerCurrentTab' ? 'drawerCurrentOrders' : 'drawerHistoryOrders');
        if (container) {
          container.innerHTML = '<div class="card" style="text-align:center;color:#64748b;padding:30px 20px;">🔒 Please login to view your orders</div>';
        }
        const inactiveContainer = document.getElementById(targetId === 'drawerCurrentTab' ? 'drawerHistoryOrders' : 'drawerCurrentOrders');
        if (inactiveContainer) inactiveContainer.innerHTML = "";
      }
      return;
    }

    if (!ordersCache.loaded) {
      currentContainer.innerHTML = '<div class="card" style="text-align:center;color:#64748b;padding:30px 20px;">⏳ Loading orders...</div>';
      historyContainer.innerHTML = '';
      if (!ordersCache.loading) loadDrawerOrders();
      return;
    }

    const activeTab = document.querySelector('.orders-tabs .tab-btn.active');
    const isCurrentTab = activeTab && activeTab.dataset.tab === 'drawerCurrentTab';
    currentContainer.innerHTML = "";
    historyContainer.innerHTML = "";

    if (isCurrentTab) {
      if (ordersCache.current.length === 0) {
        currentContainer.innerHTML = '<div class="card" style="text-align:center;color:#64748b;padding:30px 20px;">📭 No current orders</div>';
      } else {
        ordersCache.current.forEach(({ doc, data }) => {
          currentContainer.appendChild(buildOrderCardDrawer(doc, data));
        });
      }
    } else {
      if (ordersCache.history.length === 0) {
        historyContainer.innerHTML = '<div class="card" style="text-align:center;color:#64748b;padding:30px 20px;">📭 No history orders</div>';
      } else {
        ordersCache.history.forEach(({ doc, data }) => {
          const card = buildOrderCardDrawer(doc, data);
          const cancelBtn = card.querySelector("button.cancel");
          if (cancelBtn) cancelBtn.remove();
          historyContainer.appendChild(card);
        });
      }
    }
  }

  function buildOrderCardDrawer(docSnap, orderData) {
    const order = orderData || docSnap.data();
    const docId = docSnap.id || docSnap?.id || Math.random().toString(36).substr(2, 6);
    const div = document.createElement("div");
    div.className = "card";
    let itemsHtml = order.items ? order.items.map(item =>
      `<p style="font-size:11px;margin:2px 0;">${item.name} x ${item.qty} = ${formatPKR(toPKR(item.price * item.qty))}</p>`
    ).join("") : "";
    let statusHtml = `<div class="status-timeline">
            <div class="status-step ${order.status === "Pending" ? "active" : (order.status !== "Pending" && order.status !== "Cancelled" ? "completed" : "")}">📦</div>
            <div class="status-step ${order.status === "Packed" ? "active" : (order.status === "PickedUp" || order.status === "Delivered" ? "completed" : "")}">📋</div>
            <div class="status-step ${order.status === "PickedUp" ? "active" : (order.status === "Delivered" ? "completed" : "")}">🚴</div>
            <div class="status-step ${order.status === "Delivered" ? "active completed" : ""}">🏠</div>
        </div>`;
    div.innerHTML = `
            <div style="font-weight:600;font-size:13px;">Order #${docId.slice(-6)}</div>
            ${statusHtml}
            <div><strong>Status:</strong> <span class="ok">${order.status}</span></div>
            <div><strong>Total:</strong> ${formatPKR(order.totalBill || 0)}</div>
            <div style="font-size:11px;color:#64748b;">${order.address}</div>
            <hr style="margin:4px 0;">
            ${itemsHtml}
        `;
    if (order.status === "Pending" || order.status === "Packed") {
      const cancelBtn = document.createElement("button");
      cancelBtn.textContent = "❌ Cancel";
      cancelBtn.className = "cancel";
      cancelBtn.onclick = async () => {
        if (!confirm("Cancel order?")) return;
        try {
          await updateDoc(doc(db, "orders", docId), {
            status: "Cancelled",
            cancelledTime: Date.now()
          });
          alert("✅ Order Cancelled");
          ordersCache.loaded = false;
          loadDrawerOrders();
        } catch (err) {
          alert("Error cancelling: " + err.message);
        }
      };
      div.appendChild(cancelBtn);
    }
    return div;
  }

  let allProducts = [];
  let productIdCounter = 1;
  categoryData.forEach(cat => {
    cat.boxes.forEach(box => {
      box.items.forEach(item => {
        allProducts.push({
          id: productIdCounter++,
          name: item.name,
          price: item.price,
          category: cat.name,
          boxLabel: box.label,
          catEmoji: cat.emoji
        });
      });
    });
  });

  // ===== RENDER FUNCTIONS =====
  function renderCategories() {
    const container = document.getElementById("categories");
    container.innerHTML = "";
    categoryData.forEach(cat => {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = `${cat.emoji} ${cat.name}`;
      container.appendChild(title);
      const grid = document.createElement("div");
      grid.className = "category-grid";
      cat.boxes.forEach(box => {
        const card = document.createElement("div");
        card.className = "category-card";
        card.innerHTML = `<img class="cat-img" src="${categoryImage}" alt="${box.label}" loading="lazy"><span class="cat-name">${box.label}</span>`;
        card.addEventListener("click", () => showBoxProducts(cat.name, box.label, box.items));
        grid.appendChild(card);
      });
      container.appendChild(grid);
    });
  }

  function renderCurrentProducts() {
    const section = document.getElementById("productsSection");
    if (section.style.display === "block") {
      document.querySelectorAll(".wishlist-btn").forEach(btn => {
        const id = parseInt(btn.dataset.productId);
        if (isInWishlist(id)) {
          btn.classList.add("active");
          btn.textContent = "❤️";
        } else {
          btn.classList.remove("active");
          btn.textContent = "🤍";
        }
      });
      document.querySelectorAll(".qty-display").forEach(el => {
        const id = parseInt(el.dataset.id);
        el.textContent = getCartQty(id);
      });
      document.querySelectorAll(".product-card").forEach(card => {
        const id = parseInt(card.dataset.productId);
        const qty = getCartQty(id);
        const btn = card.querySelector(".add-to-cart-btn");
        const controls = card.querySelector(".qty-controls");
        if (qty > 0) {
          if (btn) btn.style.display = "none";
          if (controls) {
            controls.classList.remove("hidden");
            controls.querySelector(".qty-display").textContent = qty;
          }
        } else {
          if (btn) btn.style.display = "block";
          if (controls) controls.classList.add("hidden");
        }
      });
    }
  }

  function showBoxProducts(cat, label, items) {
    const section = document.getElementById("productsSection");
    const title = document.getElementById("categoryTitle");
    const productContainer = document.getElementById("products");
    section.style.display = "block";
    document.getElementById("categories").style.display = "none";
    title.textContent = label;
    productContainer.innerHTML = "";
    items.forEach((item, index) => {
      const prod = allProducts.find(p => p.name === item.name && p.price === item.price);
      const id = prod ? prod.id : Math.random().toString(36).substr(2, 5);
      const qty = getCartQty(id);
      const isFav = isInWishlist(id);
      const card = document.createElement("div");
      card.className = "product-card";
      card.dataset.productId = id;
      const hasQty = qty > 0;
      const imgSrc = productImages[index % productImages.length];
      card.innerHTML = `
                <button class="wishlist-btn ${isFav ? "active" : ""}" data-product-id="${id}">${isFav ? "❤️" : "🤍"}</button>
                <img class="product-img" src="${imgSrc}" alt="${item.name}" loading="lazy">
                <div class="product-name">${item.name}</div>
                <div class="product-price">${formatPKR(toPKR(item.price))}</div>
                <button class="add-to-cart-btn" data-id="${id}" style="${hasQty ? "display:none" : ""}">Add to Cart</button>
                <div class="qty-controls ${hasQty ? "" : "hidden"}">
                    <button class="qty-minus" data-id="${id}">−</button>
                    <span class="qty-display" data-id="${id}">${qty}</span>
                    <button class="qty-plus" data-id="${id}">+</button>
                </div>
            `;
      productContainer.appendChild(card);
      const atcBtn = card.querySelector(".add-to-cart-btn");
      if (atcBtn) {
        atcBtn.addEventListener("click", e => {
          e.stopPropagation();
          addToCart(id);
        });
      }
      card.querySelector(".wishlist-btn").addEventListener("click", e => {
        e.stopPropagation();
        toggleWishlist(id);
      });
      card.querySelector(".qty-plus").addEventListener("click", e => {
        e.stopPropagation();
        addToCart(id);
      });
      card.querySelector(".qty-minus").addEventListener("click", e => {
        e.stopPropagation();
        removeFromCart(id);
      });
    });
  }

  function goToCategories() {
    document.getElementById("productsSection").style.display = "none";
    document.getElementById("categories").style.display = "block";
    history.pushState({ page: "categories" }, "");
  }

  window.addEventListener("popstate", () => {
    if (document.getElementById("productsSection").style.display === "block") goToCategories();
  });
  history.replaceState({ page: "categories" }, "");
  document.getElementById("backToCategoriesBtn").addEventListener("click", goToCategories);

  const origShowBoxProducts = showBoxProducts;
  showBoxProducts = function(cat, label, items) {
    origShowBoxProducts(cat, label, items);
    history.pushState({ page: "products" }, "");
  };
  window.showBoxProducts = showBoxProducts;

  function renderCart() {}

  // ===== SEARCH FUNCTIONALITY =====
  const searchInput = document.getElementById("searchInput");
  const placeholder = document.getElementById("searchPlaceholder");
  searchInput.addEventListener("focus", () => {
    placeholder.style.opacity = "0";
  });
  searchInput.addEventListener("blur", () => {
    if (searchInput.value === "") {
      placeholder.style.opacity = "1";
    }
  });

  document.getElementById("searchInput").addEventListener("input", function(e) {
    const query = e.target.value.trim().toLowerCase();
    if (query === "") {
      document.getElementById("categories").style.display = "block";
      document.getElementById("productsSection").style.display = "none";
      history.pushState({ page: "categories" }, "");
      return;
    }
    const results = allProducts.filter(p =>
      p.name.toLowerCase().includes(query) ||
      p.category.toLowerCase().includes(query)
    );
    const section = document.getElementById("productsSection");
    section.style.display = "block";
    document.getElementById("categories").style.display = "none";
    document.getElementById("categoryTitle").textContent = results.length ? `Results (${results.length})` : "No results";
    const productContainer = document.getElementById("products");
    productContainer.innerHTML = "";
    if (results.length === 0) {
      productContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#64748b;">No products found</div>';
      return;
    }
    results.forEach((prod, index) => {
      const qty = getCartQty(prod.id);
      const isFav = isInWishlist(prod.id);
      const card = document.createElement("div");
      card.className = "product-card";
      card.dataset.productId = prod.id;
      const hasQty = qty > 0;
      const imgSrc = productImages[index % productImages.length];
      card.innerHTML = `
                <button class="wishlist-btn ${isFav ? "active" : ""}" data-product-id="${prod.id}">${isFav ? "❤️" : "🤍"}</button>
                <img class="product-img" src="${imgSrc}" alt="${prod.name}" loading="lazy">
                <div class="product-name">${prod.name}</div>
                <div class="product-price">${formatPKR(toPKR(prod.price))}</div>
                <button class="add-to-cart-btn" data-id="${prod.id}" style="${hasQty ? "display:none" : ""}">Add to Cart</button>
                <div class="qty-controls ${hasQty ? "" : "hidden"}">
                    <button class="qty-minus" data-id="${prod.id}">−</button>
                    <span class="qty-display" data-id="${prod.id}">${qty}</span>
                    <button class="qty-plus" data-id="${prod.id}">+</button>
                </div>
            `;
      productContainer.appendChild(card);
      const atcBtn = card.querySelector(".add-to-cart-btn");
      if (atcBtn) {
        atcBtn.addEventListener("click", e => {
          e.stopPropagation();
          addToCart(prod.id);
        });
      }
      card.querySelector(".wishlist-btn").addEventListener("click", e => {
        e.stopPropagation();
        toggleWishlist(prod.id);
      });
      card.querySelector(".qty-plus").addEventListener("click", e => {
        e.stopPropagation();
        addToCart(prod.id);
      });
      card.querySelector(".qty-minus").addEventListener("click", e => {
        e.stopPropagation();
        removeFromCart(prod.id);
      });
    });
    history.pushState({ page: "products" }, "");
  });

  // ===== AUTHENTICATION =====
  async function loginGoogle() {
    try {
      const result = await signInWithPopup(auth, provider);
      currentUser = result.user;
      loadWishlist();
      updateProfileDisplay(currentUser);
      renderDrawerContent();
      renderCurrentProducts();
      updateStickyBar();
      ordersCache.loaded = false;
      loadDrawerOrders();
    } catch (e) {
      alert("Login failed: " + e.message);
    }
  }

  function updateProfileDisplay(user) {
    const profileSvg = document.getElementById("profileSvg");
    const profileImg = document.getElementById("profileImg");
    if (user && user.photoURL) {
      profileSvg.style.display = "none";
      profileImg.style.display = "block";
      profileImg.src = user.photoURL;
    } else {
      profileSvg.style.display = "block";
      profileImg.style.display = "none";
    }
  }

  // ===== AUTH STATE OBSERVER =====
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      loadWishlist();
      document.getElementById("customerArea").style.display = "block";
      renderCategories();
      document.getElementById("productsSection").style.display = "none";
      document.getElementById("categories").style.display = "block";
      updateProfileDisplay(user);
      renderDrawerContent();
      renderCurrentProducts();
      renderCartDrawer();
      updateStickyBar();
      ordersCache.loaded = false;
      loadDrawerOrders();
    } else {
      currentUser = null;
      wishlist = [];
      renderCategories();
      document.getElementById("productsSection").style.display = "none";
      document.getElementById("categories").style.display = "block";
      cart = [];
      saveCartToStorage();
      renderCart();
      renderCartDrawer();
      renderDrawerContent();
      renderCurrentProducts();
      updateStickyBar();
      updateProfileDisplay(null);
      ordersCache.loaded = false;
      ordersCache.current = [];
      ordersCache.history = [];
    }
  });

  // ===== INITIALIZATION =====
  loadCartFromStorage();
  loadWishlistFromStorage();
  renderCategories();
  renderCart();
  renderCartDrawer();
  document.getElementById("productsSection").style.display = "none";
  document.getElementById("categories").style.display = "block";
  updateStickyBar();
  console.log("✅ FreshMart Loaded with local cart/wishlist persistence & sticky bar hide logic");
</script>
